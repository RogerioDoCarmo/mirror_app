name: Mirror Android Build

# Publishes a self-contained, buildable Gradle snapshot of the Android
# project to RogerioDoCarmo/mirror_app-android on every release, so
# downstream build systems (e.g. F-Droid) can build with plain
# `./gradlew assembleRelease` — no pnpm/npm registry access required.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to mirror (e.g. v1.3.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Checkout source at release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
          path: source

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Generate native Android project
        working-directory: source
        run: npx expo prebuild --platform android --no-install

      - name: Set deterministic versionCode from tag
        working-directory: source
        run: |
          # appVersionSource=remote means prebuild has no EAS connection here,
          # so build.gradle always gets a hardcoded placeholder versionCode.
          # Derive a real one straight from the semver tag instead — F-Droid
          # only needs it to match the built APK and increase monotonically,
          # not to match Play Store's own numbering.
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Setting versionCode=$CODE for $TAG"
          sed -i "s/versionCode [0-9][0-9]*/versionCode $CODE/" android/app/build.gradle
          grep -n "versionCode\|versionName" android/app/build.gradle

      - name: Assemble build-only snapshot
        run: |
          # node_modules is intentionally NOT mirrored: F-Droid's recipe
          # installs dependencies at build time with `pnpm install
          # --frozen-lockfile`, pinned by the mirrored pnpm-lock.yaml.
          mkdir -p mirror
          items=(
            android
            src
            App.tsx
            index.ts
            assets
            app.json
            package.json
            pnpm-lock.yaml
            tsconfig.json
            metro.config.js
            plugins
            LICENSE
            PRIVACY.md
          )
          for item in "${items[@]}"; do
            if [ -e "source/$item" ]; then
              cp -R "source/$item" "mirror/$item"
            fi
          done

      - name: Make snapshot F-Droid source-buildable
        run: |
          # F-Droid policy requires everything in the APK to be compiled from
          # source on their servers. Expo ships its native modules as prebuilt
          # AARs (local-maven-repo/) by default — force Gradle to compile every
          # Expo/RN module from source instead, via Expo's official autolinking
          # option. The unused AARs are then removed by the F-Droid scanner's
          # scandelete without affecting the build.
          node -e "
            const fs = require('fs');
            const f = 'mirror/package.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.expo = j.expo || {};
            j.expo.autolinking = j.expo.autolinking || {};
            j.expo.autolinking.android = j.expo.autolinking.android || {};
            j.expo.autolinking.android.buildFromSource = ['.*'];
            fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
          "
          # F-Droid's scanner resolves real paths, but pnpm's default layout
          # symlinks everything through node_modules/.pnpm/<name@ver_peerhash>/,
          # whose dir names change with the lockfile — impossible to reference
          # stably from the recipe's scanignore. node-linker=hoisted makes pnpm
          # produce a flat, symlink-free node_modules so plain paths are real.
          echo "node-linker=hoisted" > mirror/.npmrc

      - name: Checkout destination repository
        uses: actions/checkout@v7
        with:
          repository: RogerioDoCarmo/mirror_app-android
          token: ${{ secrets.MIRROR_APP_ANDROID_TOKEN }}
          path: dest

      - name: Sync snapshot into destination
        run: |
          rsync -a --delete --exclude='.git' --exclude='README.md' --exclude='.gitignore' --exclude='fastlane' mirror/ dest/

      - name: Commit and push
        working-directory: dest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror for $TAG"
            exit 0
          fi
          git commit -m "Mirror $TAG from mirror_app"
          git tag -f "$TAG"
          git push origin main
          git push origin "$TAG" --force
