name: Firebase App Distribution

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build and distribute
        required: true
        default: all
        type: choice
        options: [all, android, ios]

# Do NOT cancel in-progress distributions. A version-bump merge to develop
# starts a distribution; if another push lands seconds later (e.g. "Update
# branch" on an open release PR, which pushes a merge commit), cancel-in-progress
# would kill the bump's run before it even evaluates the version gate — so the
# new version silently never reaches testers (this happened to 1.2.5). With
# cancel-in-progress: false, a later push queues behind the bump run instead of
# killing it: the bump run completes and distributes, and the follow-up run then
# runs the gate and correctly skips (no version change).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate distribution on a package-version bump. A plain push to develop (e.g.
  # merging a CI/config/docs PR) must NOT create a new Firebase release — only
  # merges that bump "version" in package.json should. This prevents the
  # duplicate same-version releases that came from distributing on every push.
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need history so we can read package.json at the previous commit.
          fetch-depth: 0
      - name: Compare package.json version against the previous commit
        id: check
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          # Manual dispatch always distributes the current version.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — distributing $CURRENT."
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREVIOUS=$(git show "$BEFORE:package.json" 2>/dev/null | jq -r '.version' || echo "")
          echo "Previous: ${PREVIOUS:-<none>} | Current: $CURRENT"
          if [ -n "$PREVIOUS" ] && [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "Version bumped $PREVIOUS -> $CURRENT; distributing."
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "No package version change; skipping distribution."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  distribute-android:
    name: Distribute — Android
    needs: check-version
    runs-on: ubuntu-latest
    # Only when the version bumped; on manual dispatch honour the platform input.
    if: >-
      needs.check-version.outputs.bumped == 'true' &&
      (github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'android')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # The Android Gradle Plugin requires Java 17; ubuntu-latest ships JDK 11.
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      # Builds a signed APK locally on the runner.  Firebase App Distribution
      # requires an APK (not AAB), which is why the "firebase" profile sets
      # buildType: "apk" in eas.json.
      - name: Build Android APK (local)
        run: eas build --platform android --profile firebase --local --non-interactive

      - name: Find APK artifact
        id: apk
        run: |
          APK=$(find . -name "*.apk" \
            -not -path "*/node_modules/*" \
            -not -path "*/.gradle/*" \
            | head -1)
          echo "Artifact: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT

      # Use the Firebase CLI directly rather than a Docker-based action so the
      # same step works on both Linux (this job) and macOS (the iOS job) —
      # Docker container actions cannot run on macOS runners.
      - name: Upload to Firebase App Distribution
        env:
          # Passed via env (not interpolated into the command line) so the JSON
          # content cannot break shell quoting or leak in process listings.
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx -y firebase-tools appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_APP_ID" \
            --groups general-testers \
            --release-notes "Branch: ${{ github.ref_name }} (${{ github.sha }})"
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

  distribute-ios:
    name: Distribute — iOS (ad-hoc)
    needs: check-version
    runs-on: macos-latest
    if: >-
      needs.check-version.outputs.bumped == 'true' &&
      (github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == 'ios')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Builds a signed ad-hoc IPA locally on the runner.  EAS downloads the
      # distribution certificate and ad-hoc provisioning profile (scoped to
      # registered tester UDIDs) from its credential store, so no manual
      # certificate handling is required here.
      - name: Build iOS IPA (ad-hoc, local)
        run: eas build --platform ios --profile firebase --local --non-interactive

      - name: Find IPA artifact
        id: ipa
        run: |
          IPA=$(find . -name "*.ipa" \
            -not -path "*/node_modules/*" \
            | head -1)
          echo "Artifact: $IPA"
          echo "path=$IPA" >> $GITHUB_OUTPUT

      # Firebase CLI (not the Docker action) because Docker container actions
      # are unsupported on macOS runners — this was the cause of the
      # "Container action is only supported on Linux" failure.
      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          IPA_PATH: ${{ steps.ipa.outputs.path }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx -y firebase-tools appdistribution:distribute "$IPA_PATH" \
            --app "$FIREBASE_APP_ID" \
            --groups general-testers \
            --release-notes "Branch: ${{ github.ref_name }} (${{ github.sha }})"
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Upload IPA on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa-failure
          path: '*.ipa'
          if-no-files-found: ignore
