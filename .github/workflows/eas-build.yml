name: EAS Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options: [all, ios, android]
      submit:
        description: "Submit to stores after build"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          eas build --platform "$PLATFORM" --profile production --non-interactive

      - name: Submit to stores
        if: ${{ inputs.submit == 'true' || github.event_name == 'push' }}
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          eas submit --platform "$PLATFORM" --non-interactive --latest
