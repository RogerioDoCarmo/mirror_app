name: EAS Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]
      submit:
        description: 'Submit to stores after build'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict the default GITHUB_TOKEN to read-only so that no job in this
# workflow can accidentally write to the repository or create releases.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          eas build --platform "$PLATFORM" --profile production --non-interactive

      # Store submission is OPT-IN and MANUAL only — never on a push to main.
      # Auto-submitting to the App Store / Play on every release merge is both
      # undesirable (a store submission for a CI/config-only change) and was
      # failing every time, because eas.json points the Android submit at
      # ./google-services-key.json, which is gitignored and absent in CI.
      # To ship: run this workflow via "Run workflow" with submit = true, and
      # set the two secrets below.
      - name: Submit to stores
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submit == 'true' }}
        env:
          # Base64-free raw JSON of the Google Play service account key.
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          # App-specific password for the Apple ID used in eas.json submit config.
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          # Materialise the Android key (path referenced by eas.json) only for
          # the duration of the submit; remove it on exit regardless of outcome.
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > ./google-services-key.json
          trap 'rm -f ./google-services-key.json' EXIT
          eas submit --platform "$PLATFORM" --non-interactive --latest
