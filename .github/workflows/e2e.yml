name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E — iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app for simulator (EAS)
        run: eas build --platform ios --profile preview --local --non-interactive

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS simulator
        run: |
          # Pick the last available iPhone across all runtimes — avoids
          # hardcoding a model name that may not exist on the runner's Xcode.
          DEVICE_ID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices[][] | select(.name | test("^iPhone"))] | last | .udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator found. Available devices:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"

      - name: Extract and install app on simulator
        run: |
          # EAS local iOS simulator builds produce a .tar.gz archive.
          # Extract it, then locate the .app bundle inside.
          tar -xzf *.tar.gz
          APP_PATH=$(find . -name "*.app" -not -path "*/node_modules/*" | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro E2E flows
        run: maestro test .maestro/flows/

  e2e-android:
    name: E2E — Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS)
        run: eas build --platform android --profile preview --local --non-interactive

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Android emulator + Maestro E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: |
            adb install *.apk
            maestro test .maestro/flows/
