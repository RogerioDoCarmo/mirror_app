name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict the default GITHUB_TOKEN to read-only so that no job in this
# workflow can accidentally write to the repository or create releases.
permissions:
  contents: read

jobs:
  e2e-ios:
    name: E2E — iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app for simulator (EAS)
        run: eas build --platform ios --profile e2e --local --non-interactive

      - name: Install Maestro
        run: |
          # Pin to a specific version so CI never silently picks up a breaking
          # release.  Maestro 2.6.0 removed label: as a selector key; bump this
          # pin deliberately after verifying the flows against a new release.
          curl -Ls "https://get.maestro.mobile.dev" | MAESTRO_VERSION=2.6.0 bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS simulator
        run: |
          # Pick the last available iPhone across all runtimes — avoids
          # hardcoding a model name that may not exist on the runner's Xcode.
          DEVICE_ID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices[][] | select(.name | test("^iPhone"))] | last | .udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator found. Available devices:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"
          # Open the Simulator.app GUI process — Maestro's XCTest driver
          # requires it to be running, not just the headless simctl device.
          open -a Simulator
          # Block until SpringBoard is fully ready before proceeding.
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Extract and install app on simulator
        run: |
          # EAS local iOS simulator builds produce a .tar.gz archive.
          # Extract it, then locate the .app bundle inside.
          tar -xzf *.tar.gz
          APP_PATH=$(find . -name "*.app" -not -path "*/node_modules/*" | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro E2E flows
        env:
          # CI runners are slower than local machines; give the XCTest
          # driver extra time to attach to the simulator before timing out.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          # Use the full binary path so we are not affected by whether
          # $GITHUB_PATH was flushed before this step executed.
          #
          # Flows are listed explicitly in dependency order rather than
          # using the glob form ("test .maestro/flows/"), which would run
          # them alphabetically — camera before permission.  If the camera
          # flow runs first it grants the permission; the subsequent
          # "camera: unset" in the permission flow then calls
          # "xcrun simctl privacy reset", which is unreliable on iOS
          # simulator after a prior grant and leaves the app seeing the
          # camera view instead of the permission screen.  Running the
          # permission flow first avoids that reset entirely.
          "$HOME/.maestro/bin/maestro" test \
            .maestro/flows/mirror_permission_flow.yaml \
            .maestro/flows/mirror_camera_flow.yaml

      - name: Capture simulator screenshot on failure
        if: failure()
        run: xcrun simctl io booted screenshot /tmp/ios-simulator.png || true

      - name: Upload iOS diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-diagnostics
          path: |
            /tmp/ios-simulator.png
            screenshots/
            # Maestro's takeScreenshot writes <name>.png to the working dir;
            # these show the screen at the moment each flow started, unlike the
            # simctl screenshot which is captured only after the whole run ends.
            permission-flow-initial.png
            camera-flow-initial.png
          if-no-files-found: ignore

  e2e-android:
    name: E2E — Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # AGP (Android Gradle Plugin) requires Java 17.  ubuntu-22.04 ships
      # Temurin 11 by default, causing a fatal build error:
      # "Android Gradle plugin requires Java 17 to run."
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK (EAS)
        run: eas build --platform android --profile e2e --local --non-interactive

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          # Pin to a specific version so CI never silently picks up a breaking
          # release.  Maestro 2.6.0 removed label: as a selector key; bump this
          # pin deliberately after verifying the flows against a new release.
          curl -Ls "https://get.maestro.mobile.dev" | MAESTRO_VERSION=2.6.0 bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Android emulator + Maestro E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          # Use the AOSP (default) image instead of google_apis.
          # google_apis adds Play Services background processes that compete
          # for CPU/RAM on the emulator, dramatically slowing app startup.
          # Miroji uses no Google APIs so this change is safe.
          target: default
          arch: x86_64
          # Enable virtual front and back camera so the expo-camera TurboModule
          # can initialise successfully.  Without at least one emulated camera
          # device the native camera module silently rejects permission-check
          # calls, leaving useCameraPermissions() stuck at null forever.
          emulator-options: '-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back emulated -camera-front emulated'
          script: |
            adb install *.apk
            # Stream error-level logcat to a file for post-mortem analysis;
            # cleared first so only output from this run is captured.
            adb logcat -c
            adb logcat *:E > /tmp/logcat.txt &
            LOGCAT_PID=$!
            # Give Maestro the same generous driver-startup window as iOS.
            # Flows listed explicitly so mirror_permission_flow runs before
            # mirror_camera_flow — see the iOS step comment for rationale.
            # NOTE: must be a SINGLE line.  The reactivecircus/android-emulator-runner
            # action does not preserve bash "\" line-continuations inside its
            # script block, so a multi-line command leaks a literal "\" as an
            # argument ("Flow path does not exist: .../\").
            MAESTRO_DRIVER_STARTUP_TIMEOUT=300000 maestro test .maestro/flows/mirror_permission_flow.yaml .maestro/flows/mirror_camera_flow.yaml
            EXIT_CODE=$?
            kill $LOGCAT_PID 2>/dev/null || true
            exit $EXIT_CODE

      - name: Dump UI hierarchy on failure
        if: failure()
        run: |
          adb shell uiautomator dump /sdcard/window_dump.xml || true
          adb pull /sdcard/window_dump.xml /tmp/window_dump.xml || true

      - name: Upload Android diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-diagnostics
          path: |
            /tmp/logcat.txt
            /tmp/window_dump.xml
            screenshots/
            permission-flow-initial.png
            camera-flow-initial.png
          if-no-files-found: ignore
