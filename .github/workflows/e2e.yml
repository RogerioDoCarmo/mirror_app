name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: E2E — iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app for simulator (EAS)
        run: eas build --platform ios --profile preview --local --non-interactive

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS simulator
        run: |
          # Pick the last available iPhone across all runtimes — avoids
          # hardcoding a model name that may not exist on the runner's Xcode.
          DEVICE_ID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices[][] | select(.name | test("^iPhone"))] | last | .udid')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator found. Available devices:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"
          # Open the Simulator.app GUI process — Maestro's XCTest driver
          # requires it to be running, not just the headless simctl device.
          open -a Simulator
          # Block until SpringBoard is fully ready before proceeding.
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Extract and install app on simulator
        run: |
          # EAS local iOS simulator builds produce a .tar.gz archive.
          # Extract it, then locate the .app bundle inside.
          tar -xzf *.tar.gz
          APP_PATH=$(find . -name "*.app" -not -path "*/node_modules/*" | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro E2E flows
        env:
          # CI runners are slower than local machines; give the XCTest
          # driver extra time to attach to the simulator before timing out.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: maestro test .maestro/flows/

      - name: Capture simulator screenshot on failure
        if: failure()
        run: xcrun simctl io booted screenshot /tmp/ios-simulator.png || true

      - name: Upload iOS diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-diagnostics
          path: |
            /tmp/ios-simulator.png
            screenshots/
          if-no-files-found: ignore

  e2e-android:
    name: E2E — Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (EAS)
        run: eas build --platform android --profile preview --local --non-interactive

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Android emulator + Maestro E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          # Use the AOSP (default) image instead of google_apis.
          # google_apis adds Play Services background processes that compete
          # for CPU/RAM on the emulator, dramatically slowing app startup.
          # MirrorApp uses no Google APIs so this change is safe.
          target: default
          arch: x86_64
          # Enable virtual front and back camera so the expo-camera TurboModule
          # can initialise successfully.  Without at least one emulated camera
          # device the native camera module silently rejects permission-check
          # calls, leaving useCameraPermissions() stuck at null forever.
          emulator-options: '-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back emulated -camera-front emulated'
          script: |
            adb install *.apk
            # Stream error-level logcat to a file for post-mortem analysis;
            # cleared first so only output from this run is captured.
            adb logcat -c
            adb logcat *:E > /tmp/logcat.txt &
            LOGCAT_PID=$!
            # Give Maestro the same generous driver-startup window as iOS.
            MAESTRO_DRIVER_STARTUP_TIMEOUT=300000 maestro test .maestro/flows/
            EXIT_CODE=$?
            kill $LOGCAT_PID 2>/dev/null || true
            exit $EXIT_CODE

      - name: Dump UI hierarchy on failure
        if: failure()
        run: |
          adb shell uiautomator dump /sdcard/window_dump.xml || true
          adb pull /sdcard/window_dump.xml /tmp/window_dump.xml || true

      - name: Upload Android diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-diagnostics
          path: |
            /tmp/logcat.txt
            /tmp/window_dump.xml
            screenshots/
          if-no-files-found: ignore
