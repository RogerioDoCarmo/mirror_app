appId: com.mirrorapp.app
---
# ── State 1: permission denied ──────────────────────────────────────────────
# Launch with camera permission unset (undetermined) and verify our
# permission-rationale UI is displayed correctly.
- launchApp:
    permissions:
      camera: unset

# Capture the initial screen state immediately after launch for diagnostics.
- takeScreenshot: permission-flow-initial

# CI runners (Android emulator and macOS iOS simulator) are significantly
# slower than physical devices; the initial permission state resolves
# asynchronously and took 16 s on a real device.  120 s gives CI enough
# headroom before failing.
#
# Use accessibilityText: to match accessibilityLabel / contentDescription on
# both platforms.  In Maestro 2.6.0 the label: key was repurposed as a command
# display annotation (CLI output label), no longer an element selector.
# accessibilityText: is the canonical selector that maps to Android
# contentDescription / iOS accessibilityLabel.  Every testID element in this
# app also carries an accessibilityLabel with the same value, so
# accessibilityText: assertions are reliable across both platforms.
- extendedWaitUntil:
    visible:
      accessibilityText: 'permission-rationale'
    timeout: 120000

- assertVisible:
    accessibilityText: 'permission-rationale'
# The Button's Pressable is an accessibility element (accessibilityRole="button"),
# so its child <Text> is hidden from the accessibility tree on both platforms.
# Use accessibilityText: to match the Pressable's own accessibilityLabel
# (= contentDescription on Android) instead of the invisible inner text node.
- assertVisible:
    accessibilityText: 'Grant Permission'

# ── State 2: permission granted ──────────────────────────────────────────────
# Relaunch with the permission explicitly allowed without tapping the button
# first. Tapping 'Grant Permission' triggers the iOS/Android OS permission
# dialog; while that dialog is active, xcrun simctl privacy grant cannot
# reliably update the permission state, causing the subsequent launchApp to
# reopen the app with an undetermined permission and fail the assertion below.
# The button's interactivity is covered by unit tests; what we own at the
# E2E level is that each permission state renders the correct UI.
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      accessibilityText: 'mirror-container'
    timeout: 120000

- assertVisible:
    accessibilityText: 'mirror-container'
