appId: com.mirrorapp.app
---
# ── State 1: permission denied ──────────────────────────────────────────────
# Launch with camera permission unset (undetermined) and verify our
# permission-rationale UI is displayed correctly.
- launchApp:
    clearState: true
    permissions:
      camera: unset

# Capture the initial screen state immediately after launch for diagnostics.
- takeScreenshot: permission-flow-initial

# CI runners (Android emulator and macOS iOS simulator) are significantly
# slower than physical devices; the initial permission state resolves
# asynchronously and took 16 s on a real device.  120 s gives CI enough
# headroom before failing.
#
# Use text: with the element's VISIBLE TEXT content (not its accessibilityLabel
# value).  Maestro's text: selector calls textMatches() which searches both the
# "text" node attribute (visible text, always present for <Text> components) and
# "accessibilityText" (contentDescription on Android / accessibilityLabel on iOS).
# React Native Fabric does not reliably propagate accessibilityLabel to
# contentDescription unless accessible={true} is also set, so matching via
# visible text is the safest cross-platform strategy for text-bearing elements.
- extendedWaitUntil:
    visible:
      # Exact string from src/i18n/translations/en.ts → permission.cameraRequired
      text: 'Camera access is required to use MirrorApp.'
    timeout: 120000

- assertVisible:
    text: 'Camera access is required to use MirrorApp.'

# The Button's Pressable has accessible={false} (default) with accessibilityRole
# "button".  On Android UIAutomator2, the inner <Text> child is still in the
# node tree and carries the visible text "Grant Permission", so text: matches it
# via the "text" node attribute.  On iOS the Pressable's own XCTest label
# (= accessibilityLabel = "Grant Permission") is matched via "accessibilityText".
- assertVisible:
    # Exact string from src/i18n/translations/en.ts → permission.grantButton
    text: 'Grant Permission'

# ── State 2: permission granted ──────────────────────────────────────────────
# Relaunch with the permission explicitly allowed without tapping the button
# first. Tapping 'Grant Permission' triggers the iOS/Android OS permission
# dialog; while that dialog is active, xcrun simctl privacy grant cannot
# reliably update the permission state, causing the subsequent launchApp to
# reopen the app with an undetermined permission and fail the assertion below.
# The button's interactivity is covered by unit tests; what we own at the
# E2E level is that each permission state renders the correct UI.
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      # CameraView has accessible={true} so Fabric exposes contentDescription=
      # "camera-view" to UIAutomator2 / XCTest, making text: reliable here.
      text: 'camera-view'
    timeout: 120000

- assertVisible:
    text: 'camera-view'
