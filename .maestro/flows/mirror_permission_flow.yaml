appId: com.mirrorapp.app
---
# Reset camera permission to undetermined so the rationale UI is always shown,
# regardless of what previous flows (or manual runs) may have granted.
- launchApp:
    clearState: true
    permissions:
      camera: unset

- assertVisible: 'Camera access is required to use MirrorApp.'
- tapOn: 'Grant Permission'

# After tapping our button the OS shows its own camera permission dialog.
# Tap Allow to grant access.
- tapOn: 'Allow'

# Once permission is granted the app should navigate to the camera view.
- assertVisible:
    id: 'mirror-container'
