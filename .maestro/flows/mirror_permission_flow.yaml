appId: com.mirrorapp.app
---
# Reset only the OS-level camera permission to undetermined so the rationale
# UI is always shown, regardless of what previous flows may have granted.
# clearState is intentionally omitted — see mirror_camera_flow.yaml comment.
- launchApp:
    permissions:
      camera: unset

- assertVisible: 'Camera access is required to use MirrorApp.'
- tapOn: 'Grant Permission'

# System permission dialog button text varies by platform and OS version:
#   iOS 14+       : "Allow While Using App"
#   iOS ≤13       : "Allow"
#   Android 11+   : "While using the app"   (API 30+, incl. CI API 33)
#   Android ≤10   : "Allow"
# Each block only executes when its button is actually visible.
- runFlow:
    when:
      visible: 'Allow While Using App'
    commands:
      - tapOn: 'Allow While Using App'
- runFlow:
    when:
      visible: 'While using the app'
    commands:
      - tapOn: 'While using the app'
- runFlow:
    when:
      visible: 'Allow'
    commands:
      - tapOn: 'Allow'

- assertVisible:
    id: 'mirror-container'
