appId: com.mirrorapp.app
---
# ── State 1: permission denied ──────────────────────────────────────────────
# Launch with camera permission unset (undetermined) and verify our
# permission-rationale UI is displayed correctly.
- launchApp:
    permissions:
      camera: unset

# CI runners (Android emulator and macOS iOS simulator) are significantly
# slower than physical devices; the initial permission state resolves
# asynchronously and took 16 s on a real device.  120 s gives CI enough
# headroom before failing.  Asserting by testID (permission-rationale) rather
# than the English text string makes the check locale-independent.
- extendedWaitUntil:
    visible:
      id: 'permission-rationale'
    timeout: 120000

- assertVisible:
    id: 'permission-rationale'
- assertVisible: 'Grant Permission'

# ── State 2: permission granted ──────────────────────────────────────────────
# Relaunch with the permission explicitly allowed without tapping the button
# first. Tapping 'Grant Permission' triggers the iOS/Android OS permission
# dialog; while that dialog is active, xcrun simctl privacy grant cannot
# reliably update the permission state, causing the subsequent launchApp to
# reopen the app with an undetermined permission and fail the assertion below.
# The button's interactivity is covered by unit tests; what we own at the
# E2E level is that each permission state renders the correct UI.
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      id: 'mirror-container'
    timeout: 120000

- assertVisible:
    id: 'mirror-container'
