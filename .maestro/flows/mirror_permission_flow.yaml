appId: com.rogeriodocarmo.miroji
---
# ── State 1: permission denied ──────────────────────────────────────────────
# Launch with camera permission unset (undetermined) and verify our
# permission-rationale UI is displayed correctly.
- launchApp:
    clearState: true
    permissions:
      camera: unset

# Capture the initial screen state immediately after launch for diagnostics.
- takeScreenshot: permission-flow-initial

# CI runners (Android emulator and macOS iOS simulator) are significantly
# slower than physical devices; the initial permission state resolves
# asynchronously and took 16 s on a real device.  120 s gives CI enough
# headroom before failing.
#
# Match on the element's STABLE accessibilityLabel ("permission-rationale"),
# NOT on its visible text.  The visible text is localised via t() and the CI
# device's locale is not guaranteed to be English, so asserting the English
# string fails whenever the simulator/emulator runs in another language (this
# was the actual cause of the long-standing iOS failure: camera-view, a
# locale-independent label, passed while the localised rationale text did not).
#
# The rationale <Text> has accessible={true} in PermissionGate.tsx, so Fabric
# exposes accessibilityLabel as content-desc (Android) / accessibilityLabel
# (iOS).  Maestro's text: selector calls textMatches(), which searches the
# "accessibilityText" node attribute — the same mechanism that makes camera-view
# matchable below.
- extendedWaitUntil:
    visible:
      # Stable accessibilityLabel from PermissionGate.tsx (locale-independent).
      text: 'permission-rationale'
    timeout: 120000

- assertVisible:
    text: 'permission-rationale'

# ── State 2: permission granted ──────────────────────────────────────────────
# Relaunch with the permission explicitly allowed without tapping the button
# first. Tapping the 'Continue' button triggers the iOS/Android OS permission
# dialog; while that dialog is active, xcrun simctl privacy grant cannot
# reliably update the permission state, causing the subsequent launchApp to
# reopen the app with an undetermined permission and fail the assertion below.
# The button's interactivity is covered by unit tests; what we own at the
# E2E level is that each permission state renders the correct UI.
- launchApp:
    permissions:
      camera: allow

- extendedWaitUntil:
    visible:
      # CameraView has accessible={true} so Fabric exposes contentDescription=
      # "camera-view" to UIAutomator2 / XCTest, making text: reliable here.
      text: 'camera-view'
    timeout: 120000

- assertVisible:
    text: 'camera-view'
