appId: com.mirrorapp.app
---
# ── State 1: permission denied ──────────────────────────────────────────────
# Launch with camera permission unset (undetermined) and verify our
# permission-rationale UI is displayed correctly.
- launchApp:
    permissions:
      camera: unset

- assertVisible: 'Camera access is required to use MirrorApp.'
- assertVisible: 'Grant Permission'

# Tap the button to verify it is interactive and does not crash the app.
# The OS system permission dialog appears at this point. We do NOT attempt
# to interact with it — its button text and timing vary across Android API
# levels and iOS versions, making it inherently unreliable to drive with
# Maestro. Interacting with OS dialogs tests Apple/Google code, not ours.
- tapOn: 'Grant Permission'

# ── State 2: permission granted ──────────────────────────────────────────────
# Relaunch with the permission explicitly allowed. This simulates the user
# having granted access and verifies that our app correctly transitions to
# the camera view — which is the behaviour we own and care about.
- launchApp:
    permissions:
      camera: allow

- assertVisible:
    id: 'mirror-container'
