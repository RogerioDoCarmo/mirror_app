appId: com.mirrorapp.app
---
# Reset only the OS-level camera permission to undetermined.
# clearState is intentionally omitted: clearing app data on a dev build
# wipes the Metro connection URL from UserDefaults, causing the Expo
# dev client launcher to appear instead of the app. On a production /
# preview build (CI) there is no dev client, so clearState would be safe.
- launchApp:
    permissions:
      camera: unset

- assertVisible: 'Camera access is required to use MirrorApp.'
- tapOn: 'Grant Permission'

# iOS system camera permission dialog — grant access.
- tapOn: 'Allow'

- assertVisible:
    id: 'mirror-container'
