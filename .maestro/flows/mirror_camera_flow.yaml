appId: com.mirrorapp.app
---
# Pre-grant camera permission at the OS level so this flow always starts
# on the camera screen, independent of mirror_permission_flow.
# clearState is intentionally omitted — see mirror_permission_flow.yaml.
- launchApp:
    permissions:
      camera: allow

# Capture the initial screen state immediately after launch.
# On failure this screenshot (uploaded as a CI artifact) reveals whether
# the app rendered anything at all, which differentiates a JS crash from
# a slow permission check.
- takeScreenshot: camera-flow-initial

# CI runners (Android emulator and macOS iOS simulator) are significantly
# slower than physical devices.  120 s gives the JS bundle time to evaluate,
# both providers to initialise, and the camera view to mount before failing.
- extendedWaitUntil:
    visible:
      accessibilityText: 'mirror-container'
    timeout: 120000

# accessibilityText: maps to contentDescription (Android) / accessibilityLabel
# (iOS) — the Maestro 2.6.0+ canonical selector for accessibility attributes.
# More reliable than id: on React Native Fabric builds, which does not always
# propagate testID to UIAutomator2's resource-id field.
- assertVisible:
    accessibilityText: 'mirror-container'

- assertVisible:
    accessibilityText: 'camera-view'
