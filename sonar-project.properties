# SonarQube Cloud (SonarCloud) configuration.
#
# Project & organization keys — these are SonarCloud's defaults when importing
# the GitHub repo RogerioDoCarmo/mirror_app. Confirm they match your project
# under Project > Information (or Administration > Update Key) before relying
# on CI, and adjust here if SonarCloud assigned different values.
sonar.host.url=https://sonarcloud.io
sonar.organization=rogeriodocarmo
sonar.projectKey=RogerioDoCarmo_mirror_app

# Source & test layout — everything in src/ is source except test files.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**/*

# JavaScript/TypeScript test coverage (lcov produced by `jest --coverage`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Files with no runtime code to cover — mirrors jest.config.js
# collectCoverageFrom negations so the coverage metric reflects reality
# (type-only declarations and pure-data files).
sonar.coverage.exclusions=src/**/*.d.ts,src/**/index.ts,src/types/**,src/**/*.stories.ts,src/**/*.stories.tsx,src/core/**,src/i18n/translations/**
